<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/styleLancamentoPedido.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Saira:ital,wght@0,100..900;1,100..900&family=Titan+One&display=swap"
      rel="stylesheet"
    />

    <title>Lançamento de pedidos</title>
  </head>
  <body>
    <h1 id="title">Lançamento de pedidos</h1>

    <div id="containerPedido">
      <form id="formPedido" autocomplete="off">
        <div>
          <label for="id">ID:</label><br />
          <input type="text" id="id" name="id" disabled />
        </div>
        <div>
          <label for="situacao">Situação:</label><br />
          <select name="situacao" id="situacao" disabled>
            <option value="A">Ativo</option>
            <option value="I">Inativo</option>
          </select>
        </div>
        <div>
          <label for="idCliente">Cliente:</label><br />
          <input type="text" id="idCliente" name="idCliente" disabled />
          <input type="text" id="idNomeCliente" name="idNomeCliente" disabled />
          <button type="button" id="btnPesquisarCliente" disabled>
            <ion-icon name="search"></ion-icon>
          </button>
        </div>
        <div>
          <label for="observacao">Observação:</label><br />
          <textarea
            id="observacao"
            name="observacao"
            rows="4"
            cols="40"
            disabled
          ></textarea>
        </div>
        <div id="TabelaItensPedido">
          <!-- Tabela de itens do pedido carregados -->
          <table border="1" width="100%" style="margin-top: 15px">
            <thead>
              <tr>
                <th>ID_Prod</th>
                <th>Quantidade.</th>
                <th>Preço</th>
                <th>Valor</th>
                <th>Observação</th>
              </tr>
            </thead>
            <tbody id="ResultadoTabelaItensPedido">
              <!-- resultados vão aparecer aqui -->
            </tbody>
          </table>
        </div>
        <div id="botoesControleProd">
          <button type="button" id="btnAdicionarProduto" disabled>
            <ion-icon name="add-circle-outline"></ion-icon>
          </button>
          <button type="button" id="btnExcluirProduto" disabled>
            <ion-icon name="remove-circle-outline"></ion-icon>
          </button>
        </div>
      </div>
      </form>
  </body>
  <footer id="rodapeLancPedido">
    <div id="botoesLancPedido">
      <button type="button" id="btnVoltar">
        <a href="../../../index.html">Voltar</a>
      </button>
      <button type="button" id="btnNovo">Novo</button>
      <button type="button" id="btnEditar" disabled>Editar</button>
      <button type="button" id="btnExcluir" disabled>Excluir</button>
      <button type="button" id="btnConfirmar" disabled>Confirmar</button>
      <button type="button" id="btnCancelar" disabled>Cancelar</button>
      <button type="button" id="btnPesquisar">Pesquisar</button>
    </div>
  </footer>

  <script type="module" src="../../../assets/icons/ionicons.js"></script>
  <script type="module" src="../js/lancamentoPedidos.js"></script>
</html>
